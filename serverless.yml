    memorySize: 128
    package:
      patterns:
        - 'handlers/get_network_handler.py'
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
    events:
      - http:
          path: network/
          method: get
          cors: true

  node_data_aggregator_handler:
    handler: handlers/node_data_aggregator.handle
    memorySize: 256
    timeout: 30
    package:
      patterns:
        - 'handlers/node_data_aggregator.py'
    layers:
      - { Ref: PythonRequirementsLambdaLayer }

  get_token_handler:

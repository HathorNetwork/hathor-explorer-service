    memorySize: 128
    package:
      patterns:
        - 'handlers/get_token_handler.py'
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
    events:
      - http:
          path: token/{hash}
          method: get
          cors: true
          request:
            parameters:
              paths:
                hash: true
          caching:
            enabled: true
            ttlInSeconds: 15
            cacheKeyParameters:
              - name: request.path.hash
              - name: request.header.origin

